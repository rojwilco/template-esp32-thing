name: Unit Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Build & run tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - name: Cache CMake build
        uses: actions/cache@v5
        with:
          path: tests/build
          key: cmake-${{ runner.os }}-${{ hashFiles('tests/CMakeLists.txt') }}
          restore-keys: cmake-${{ runner.os }}-

      - name: Configure
        run: cmake -S tests -B tests/build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build tests/build --parallel

      - name: Test
        run: ctest --test-dir tests/build --output-on-failure

      - name: Report test results
        uses: dorny/test-reporter@v2
        if: ${{ !cancelled() }}
        with:
          name: GoogleTest results
          path: tests/build/*.xml
          reporter: java-junit
