name: Build

on:
  push:
    branches: ["**"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Compile sketch
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Install arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Cache Arduino data
        uses: actions/cache@v5
        with:
          path: ~/.arduino15
          key: arduino-${{ runner.os }}-esp32-3.3.7

      - name: Install ESP32 platform
        run: |
          arduino-cli config init --overwrite
          arduino-cli config set board_manager.additional_urls \
            https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@3.3.7

      - name: Compile sketch
        run: arduino-cli compile --fqbn esp32:esp32:d1_mini32 --export-binaries .

      - name: Rename binary with version
        run: |
          MAJOR=$(grep '#define FW_VERSION_MAJOR' version.h | awk '{print $3}')
          MINOR=$(grep '#define FW_VERSION_MINOR' version.h | awk '{print $3}')
          PATCH=$(grep '#define FW_VERSION_PATCH' version.h | awk '{print $3}')
          TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
          VERSION="${MAJOR}.${MINOR}.${PATCH}-dev-${TIMESTAMP}"
          echo "FW_VERSION=${VERSION}" >> $GITHUB_ENV
          cp build/esp32.esp32.d1_mini32/template-esp32-thing.ino.bin \
             template-esp32-thing-v${VERSION}.bin

      - name: Upload binary artifact
        uses: actions/upload-artifact@v6
        with:
          name: template-esp32-thing-v${{ env.FW_VERSION }}
          path: template-esp32-thing-v${{ env.FW_VERSION }}.bin

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Install arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Cache Arduino data
        uses: actions/cache@v5
        with:
          path: ~/.arduino15
          key: arduino-${{ runner.os }}-esp32-3.3.7

      - name: Install ESP32 platform
        run: |
          arduino-cli config init --overwrite
          arduino-cli config set board_manager.additional_urls \
            https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@3.3.7

      - name: Compile release build
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          arduino-cli compile --fqbn esp32:esp32:d1_mini32 --export-binaries .
          cp build/esp32.esp32.d1_mini32/template-esp32-thing.ino.bin \
             template-esp32-thing-v${VERSION}.bin

      - name: Create GitHub Release
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          gh release create "${GITHUB_REF_NAME}" \
            --title "v${VERSION}" \
            --generate-notes \
            "template-esp32-thing-v${VERSION}.bin"
        env:
          GH_TOKEN: ${{ github.token }}
